[package]
name = "solana_blacklist"
version = "0.0.1"
edition = "2024"
publish = false

[dependencies]
anyhow = "1"
csv = "1.3"
futures = "0.3"
jsonpath_lib = "0.3"
reqwest = { version = "0.13.2", features = ["json", "gzip", "deflate", "brotli", "zstd", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tokio = { workspace = true }
