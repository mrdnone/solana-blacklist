server {
    listen 80;
    server_name solana.mrdn.one;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name solana.mrdn.one;

    set $backend http://127.0.0.1:3000;

    ssl_certificate     /etc/letsencrypt/live/solana.mrdn.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solana.mrdn.one/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── API — proxy to the locally published Docker port ─────────────────────
    location /api/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Blacklist fetch can take up to 20s on first load
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
    }

    # ── Swagger UI — served by the Rust container at /docs ───────────────────
    location /docs {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend static assets — long-lived cache ─────────────────────────────
    location /blacklist/assets/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA — serve the React app under /blacklist/ ───────────────────────────
    location /blacklist/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Redirect bare root → app ──────────────────────────────────────────────
    location = / {
        return 301 /blacklist/;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/wasm image/svg+xml;
    gzip_min_length 256;
}
