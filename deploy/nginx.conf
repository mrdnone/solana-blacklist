server {
    listen 80;
    server_name solana.mrdn.one;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name solana.mrdn.one;

    ssl_certificate /etc/letsencrypt/live/solana.mrdn.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solana.mrdn.one/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Global root (used as fallback)
    root /var/www/solana-blacklist/frontend/dist;
    index index.html;

    # API — proxy /api/* to the Rust backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout — blacklist fetch can take up to 20s
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Hashed assets — long cache, alias strips the /blacklist/ prefix
    location /blacklist/assets/ {
        alias /var/www/solana-blacklist/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — serve the app under /blacklist/
    location /blacklist/ {
        alias /var/www/solana-blacklist/frontend/dist/;
        try_files $uri $uri/ /blacklist/index.html;
    }

    # Redirect bare root to the app
    location = / {
        return 301 /blacklist/;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/wasm;
    gzip_min_length 256;
}
